{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{% static 'dashboard/post.css' %}">
</head>
<body>
<div class="container">
    <h2>All Posts</h2>
    <a class="back-btn" href="{% url 'add_post' %}">Add New Post</a>
    <table class="post-table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for post in posts %}
            <tr>
                <td>{{ post.title }}</td>
                <td>{{ post.author }}</td>
                <td>{{ post.created_at }}</td>
                <td>
                    <a href="{% url 'view_post' post.id %}">View</a> |
                    <a href="{% url 'update_post' post.id %}">Edit</a> |
                    <a href="{% url 'delete_post' post.id %}">Delete</a>
                </td>
            </tr>
        {% empty %}
            <tr><td colspan="4">No posts yet!</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
