{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{% static 'dashboard/post.css' %}">
</head>
<body>
<div class="container">
    <h2>{{ post.title }}</h2>
    <p class="meta">By {{ post.author }} | {{ post.created_at }}</p>
    <div class="post-content">
        <p class="content">{{ post.content }}</p>
    </div>
    <a class="back-btn" href="{% url 'dashboard' %}">Back to Dashboard</a>
</div>
</body>
</html>
