{% extends "blog/base.html" %}
{% block title %}
{{ post.title }}
{% endblock %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static "post.css" %}">

<header>
<h1>{{ post.title }}</h1>
</header>

<div class="container">

<div class="post-content">

<p class="meta">
Author: {{ post.author }} • {{ post.created_at }}
</p>

<div class="content">
{{ post.content|linebreaks }}
</div>

<a href="/" class="back-btn">← Back to Home</a>

</div>

</div>

{% endblock %}
