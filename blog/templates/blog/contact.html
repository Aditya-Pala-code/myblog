{% extends "blog/base.html" %}
{% load static %}

{% block title %}Contact Us{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'contact.css' %}">

<header>
    <h1>Contact Us</h1>
</header>

<div class="container">

    <div class="contact-info">
        <p>📞 Phone: +91 7252825824</p>
        <p>✉️ Email: pala33871@gmail.com</p>
        <p>💬 WhatsApp: +91 7252825824</p>
        <p>📸 Instagram: <a href="https://instagram.com/myblog" target="_blank">@myblog</a></p>
        <p>🌐 Website: <a href="https://www.myblog.com" target="_blank">www.myblog.com</a></p>
    </div>

    <div class="contact-card">
        <form method="POST">
            {% csrf_token %}
            <!-- Name -->
<label for="id_name">Name</label>
<input type="text" id="id_name" name="name" placeholder="Your Name" value="{{ form.name.value|default_if_none:'' }}" required>

<!-- Email -->
<label for="id_email">Email</label>
<input type="email" id="id_email" name="email" placeholder="you@example.com" value="{{ form.email.value|default_if_none:'' }}" required>

<!-- Phone -->
<label for="id_phone">Phone</label>
<input type="text" id="id_phone" name="phone" placeholder="Phone no." value="{{ form.phone.value|default_if_none:'' }}" required>

<!-- Message -->
<label for="id_message">Message</label>
<textarea id="id_message" name="message" placeholder="Write your message here..." rows="6">{{ form.message.value|default_if_none:'' }}</textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

</div>
{% endblock %}
